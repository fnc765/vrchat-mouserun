name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git log全取得のため

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Generate Windows version info
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $parts = $version -split '\.'
          $major = if ($parts.Count -gt 0) { [int]$parts[0] } else { 0 }
          $minor = if ($parts.Count -gt 1) { [int]$parts[1] } else { 0 }
          $patch = if ($parts.Count -gt 2) { [int]$parts[2] } else { 0 }
          $content = @"
VSVersionInfo(
  ffi=FixedFileInfo(
    filevers=($major, $minor, $patch, 0),
    prodvers=($major, $minor, $patch, 0),
    mask=0x3f,
    flags=0x0,
    OS=0x40004,
    fileType=0x1,
    subtype=0x0,
    date=(0, 0)
  ),
  kids=[
    StringFileInfo([
      StringTable(u'040904B0', [
        StringStruct(u'FileDescription', u'VRChat MouseRun'),
        StringStruct(u'FileVersion', u'$version'),
        StringStruct(u'InternalName', u'vrchat-mouserun'),
        StringStruct(u'OriginalFilename', u'vrchat-mouserun-${{ github.ref_name }}.exe'),
        StringStruct(u'ProductName', u'VRChat MouseRun'),
        StringStruct(u'ProductVersion', u'$version')
      ])
    ]),
    VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
  ]
)
"@
          $content | Out-File -FilePath version_info.txt -Encoding utf8

      - name: Build exe
        run: uv run python -m PyInstaller main.py --onefile --noconsole --name "vrchat-mouserun-${{ github.ref_name }}" --hidden-import pynput.mouse._win32 --hidden-import pynput.keyboard._win32 --version-file version_info.txt

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $prevTag = git tag --sort=-version:refname | Select-Object -Skip 1 -First 1
          if ($prevTag) {
            $log = git log "$prevTag..HEAD" --pretty=format:"- %s" | Where-Object { $_ -ne "" }
          } else {
            $log = git log --pretty=format:"- %s" | Where-Object { $_ -ne "" }
          }
          $notes = $log -join "`n"
          # GitHub Actions multiline output (GUID-based delimiter to avoid collision)
          $eofMarker = "EOF_" + [System.Guid]::NewGuid().ToString("N")
          "notes<<$eofMarker" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "$eofMarker" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: dist/vrchat-mouserun-${{ github.ref_name }}.exe
          fail_on_unmatched_files: true
